<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="..//bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <script src="../bootstrap-5.3.8-dist/js/bootstrap.min.js" defer ></script>
</head>
<body>

     <form class="row g-3 needs-validation" novalidate>
     <div class="col-md-4">
       <label class="form-label" for="x" >Name</label>
       <input type="text" class="form-control"  value="khushi" id="x"  required >
       <div class="valid-feedback">username entered</div>
       <div class="invalid-feedback">Please choose Name</div>
        </div>

        <div class="col-md-4">
    <label for="validationCustomUsername" class="form-label">Username</label>
    <div class="input-group has-validation">
      <span class="input-group-text" id="inputGroupPrepend">@</span>
      <input type="text" class="form-control" id="validationCustomUsername" aria-describedby="inputGroupPrepend" required>
      <div class="invalid-feedback">
        Please choose a username.
      </div>
    </div>
  </div>
        <div class="col-md-4">
        <div class="form-check">
         <input class="form-check-input"  type="checkbox"id="invalid-check" required>
         <label for="invalid-check" class="form-check-label">Agree to Terms and conditions</label>
        <div class="invalid-feedback">Please agree  before submitting

        </div>
        </div>
        </div>
        <div class="col-12">
        <button class="btn btn-primary"  type="submit" >Submit Form</button>
      </div>
  </form> 


 
     



<script>
    // Example starter JavaScript for disabling form submissions if there are invalid fields
(() => {
  'use strict'

  // Fetch all the forms we want to apply custom Bootstrap validation styles to
  const forms = document.querySelectorAll('.needs-validation')

  // Loop over them and prevent submission
  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }

      form.classList.add('was-validated')
    }, false)
  })
})()
</script>

</body>
</html>
